# Reusable docs-validation workflow.
#
# Consumers call this instead of vendoring tools/link-check.py by `cp`. One source
# of truth (this repo); callers reference it and never drift. Example caller:
#
#   # <consumer-repo>/.github/workflows/docs-validate.yml
#   name: docs-validate
#   on:
#     push:        { paths: ["**/*.md", ".github/workflows/docs-validate.yml"] }
#     pull_request: { paths: ["**/*.md"] }
#   jobs:
#     validate:
#       uses: vista-cloud-dev/doc-framework/.github/workflows/validate.yml@main
#       # with: { corpus_path: docs }   # if docs live in a subdir
#
# The job checks out the CALLER corpus and this framework separately, then runs the
# link/anchor integrity checker against the corpus.
name: docs-validate (reusable)

on:
  workflow_call:
    inputs:
      corpus_path:
        description: "Subpath within the caller repo to validate (default: the whole repo)."
        required: false
        default: "."
        type: string
      framework_ref:
        description: "doc-framework ref that provides the checker."
        required: false
        default: "main"
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the caller corpus
        uses: actions/checkout@v4
        with:
          path: corpus

      - name: Check out doc-framework (the checker)
        uses: actions/checkout@v4
        with:
          repository: vista-cloud-dev/doc-framework
          ref: ${{ inputs.framework_ref }}
          path: .doc-framework

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check documentation links
        run: |
          python3 .doc-framework/tools/link-check.py \
            "corpus/${{ inputs.corpus_path }}"
