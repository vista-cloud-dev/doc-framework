# Docs corpus link/anchor integrity gate.
# Copy to .github/workflows/docs-validate.yml in your project.
# Runs the link checker on every push/PR that touches docs/.
# Zero dependencies (pure stdlib) — no `pip install` step is required.

name: docs-validate

on:
  push:
    paths:
      - "docs/**"
      - "doc-framework/**"
      - ".github/workflows/docs-validate.yml"
  pull_request:
    paths:
      - "docs/**"
      - "doc-framework/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # A broken link or anchor fails the build.
      - name: Check documentation links
        run: python3 doc-framework/tools/link-check.py docs/
